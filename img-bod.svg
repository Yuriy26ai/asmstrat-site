  <rect x="640" y="350" width="220" height="120" rx="12" fill="#FFFFFF" stroke="#DDE1E6" stroke-width="1.5"/>
  <rect x="662" y="372" width="90" height="8" rx="4" fill="#3A4654"/>
  <rect x="662" y="398" width="176" height="12" rx="6" fill="#F4F5F3" stroke="#DDE1E6"/>
